name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: nyma-linux-x64
          - target: bun-linux-arm64
            artifact: nyma-linux-arm64
          - target: bun-darwin-x64
            artifact: nyma-macos-x64
          - target: bun-darwin-arm64
            artifact: nyma-macos-arm64
          - target: bun-windows-x64
            artifact: nyma-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile ClojureScript
        run: bun run build

      - name: Build standalone binary
        run: |
          bun build ./dist/agent/cli.mjs \
            --compile \
            --target ${{ matrix.target }} \
            --external react-devtools-core \
            --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
